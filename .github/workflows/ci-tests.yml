name: WispHub API CI Pipelines

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip' # Activa el caché de pip para agilizar el proceso
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create temporary .env for tests
      run: |
        echo "WISPHUB_NET_KEY=mock-test-key-12345" > .env
        echo "WISPHUB_NET_HOST=https://wisphub.net/api" >> .env
        echo "MAX_ACTIVE_TICKETS_PER_ZONE=3" >> .env
        
    - name: Run Test Suite with Pytest
      run: |
        pytest tests/ -v --asyncio-mode=auto
